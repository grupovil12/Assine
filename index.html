<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2b0010, #140008, #000000);
            overflow: hidden;
            font-family: sans-serif;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Largura responsiva para não sumir no celular */
            width: 100%;
            max-width: 450px;
            min-height: 120px;
            padding: 20px;
            
            font-size: clamp(1.5rem, 8vw, 2.5rem); /* Fonte ajustável */
            font-family: 'Impact', sans-serif;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 1px;
            
            background: linear-gradient(135deg, #800020, #b00040, #4b0082, #e0115f);
            background-size: 300% 300%;
            border-radius: 100px;
            
            box-shadow: 0 0 50px rgba(128, 0, 32, 0.7),
                        inset 0 5px 15px rgba(255, 255, 255, 0.3);
            
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: pulse 2.5s infinite ease-in-out, glow 5s infinite alternate;
            -webkit-text-stroke: 1px rgba(0,0,0,0.6);
        }

        /* Ajuste para telas muito pequenas */
        @media (max-width: 380px) {
            .btn {
                padding: 15px;
                min-height: 100px;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Brilho passando pelo botão */
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% { left: 150%; }
        }
    </style>
</head>
<body>

    <a href="https://www.profitablecpmratenetwork.com/xhzpy4ve02?key=46aacacf28db27ff1fa7fc6ea3b41cb8" class="btn">
        CLIQUE AQUI<br>PARA CONTINUAR
    </a>

    <script>
        const button = document.querySelector('.btn');
        button.addEventListener('click', function(e) {
            const rect = button.getBoundingClientRect();
            for(let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.fontSize = '1.5rem';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '9999';
                spark.textContent = ['💋','✨','❤️','🌹'][Math.floor(Math.random()*4)];
                document.body.appendChild(spark);
                
                const destinationX = (Math.random() - 0.5) * 300;
                const destinationY = (Math.random() - 0.5) * 300;

                spark.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' });

                setTimeout(() => spark.remove(), 1000);
            }
        });
    </script>
</body>
</html>
