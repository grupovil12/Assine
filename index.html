<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1e0533, #0a0020);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      animation: subtleMove 20s linear infinite;
      z-index: 1;
    }

    .container {
      text-align: center;
      z-index: 2;
      padding: 40px;
    }

    h1 {
      color: #ffffff;
      font-size: 3.8rem;
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
      animation: glowText 2s ease-in-out infinite alternate;
    }

    .subtitle {
      color: #c0a3ff;
      font-size: 1.5rem;
      margin-bottom: 60px;
      opacity: 0.9;
    }

    .pulse-button {
      display: inline-block;
      padding: 35px 90px;
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(45deg, #ff00cc, #00ffff, #ff00cc);
      background-size: 300% 300%;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 0 40px rgba(255, 0, 204, 0.8),
                  0 0 80px rgba(0, 255, 255, 0.5);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      animation: pulse 2s infinite ease-in-out;
    }

    .pulse-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(255, 0, 204, 1),
                  0 0 100px rgba(0, 255, 255, 0.8);
    }

    .pulse-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
      animation: shine 3s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes glowText {
      from { text-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }
      to { text-shadow: 0 0 40px rgba(0, 255, 255, 0.8); }
    }

    @keyframes shine {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.6; }
    }

    .link {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ready to Continue?</h1>
    <p class="subtitle">Click the button below to proceed</p>
    
    <a href="https://toourmarketingef.com?7CQZY=1250574" class="link" target="_blank">
      <button class="pulse-button">
        Click here to continue
      </button>
    </a>
  </div>
</body>
</html>
