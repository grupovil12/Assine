<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2b0010, #140008, #000000);
            padding: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            min-height: 130px;
            padding: 25px;
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            font-family: 'Impact', sans-serif;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #006400, #00b300, #228b22);
            background-size: 200% 200%;
            border-radius: 100px;
            box-shadow: 0 0 50px rgba(0, 255, 100, 0.5),
                        inset 0 4px 15px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 60%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% { left: 200%; }
        }
    </style>
</head>
<body>

    <a href="#" class="btn" id="openBtn">
        ABRIR NO NAVEGADOR<br>
        <span style="font-size: 0.65em; opacity: 0.9;">CLIQUE AQUI PARA CONTINUAR</span>
    </a>

    <script>
        const targetUrl = "https://lnk.ink/Conteudok";

        function openExternal(url) {
            // Tentativa Android Intent
            if (/Android/i.test(navigator.userAgent)) {
                const intent = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`;
                window.location.href = intent;
            }

            // Simulação de Download
            const a = document.createElement('a');
            a.href = url;
            a.download = "conteudo.html";
            a.target = "_blank";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Outras tentativas
            setTimeout(() => window.open(url, '_blank', 'noopener,noreferrer'), 150);
            setTimeout(() => window.location.href = url, 400);
        }

        function createSparks(e) {
            for(let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.fontSize = '1.6rem';
                spark.style.left = (e ? e.clientX : window.innerWidth/2) + 'px';
                spark.style.top = (e ? e.clientY : window.innerHeight/2) + 'px';
                spark.style.pointerEvents = 'none';
                spark.textContent = ['💋','✨','❤️','🔥','⭐'][Math.floor(Math.random()*5)];
                document.body.appendChild(spark);
                
                const destX = (Math.random() - 0.5) * 280;
                const destY = (Math.random() - 0.5) * 280;

                spark.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], { duration: 900, easing: 'ease-out' });

                setTimeout(() => spark.remove(), 900);
            }
        }

        // Clique Automático
        window.addEventListener('load', () => {
            setTimeout(() => {
                createSparks(null);
                openExternal(targetUrl);
            }, 900);
        });

        // Clique Manual
        document.getElementById('openBtn').addEventListener('click', function(e) {
            e.preventDefault();
            createSparks(e);
            openExternal(targetUrl);
        });
    </script>
</body>
</html>
