<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2b0010, #140008, #000000);
            overflow: hidden;
            padding: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            min-height: 110px;
            padding: 20px;
            
            /* Fonte ajustada e sem o stroke que causava bug */
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            font-family: 'Impact', sans-serif;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            
            /* Sombra suave nas letras para dar leitura sem bugar */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            
            /* Cores Sensuais */
            background: linear-gradient(135deg, #800020, #b00040, #4b0082, #e0115f);
            background-size: 200% 200%;
            border-radius: 100px;
            
            /* Brilho externo */
            box-shadow: 0 0 40px rgba(224, 17, 95, 0.4),
                        inset 0 4px 10px rgba(255, 255, 255, 0.2);
            
            position: relative;
            overflow: hidden;
            animation: pulse 2.5s infinite ease-in-out, moveBg 4s infinite alternate;
            transition: transform 0.2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Efeito de brilho "passante" */
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 60%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(25deg);
            animation: shine 3.5s infinite;
        }

        @keyframes shine {
            100% { left: 200%; }
        }
    </style>
</head>
<body>

    <a href="https://www.profitablecpmratenetwork.com/xhzpy4ve02?key=46aacacf28db27ff1fa7fc6ea3b41cb8" class="btn">
        CLIQUE AQUI<br>PARA CONTINUAR
    </a>

    <script>
        const button = document.querySelector('.btn');
        button.addEventListener('click', function(e) {
            for(let i = 0; i < 35; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.fontSize = '1.5rem';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.pointerEvents = 'none';
                spark.textContent = ['💋','✨','❤️','🔥'][Math.floor(Math.random()*4)];
                document.body.appendChild(spark);
                
                const destX = (Math.random() - 0.5) * 250;
                const destY = (Math.random() - 0.5) * 250;

                spark.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' });

                setTimeout(() => spark.remove(), 800);
            }
        });
    </script>
</body>
</html>
