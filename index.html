<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: radial-gradient(circle, #2b0010, #140008, #000000);
            padding: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            min-height: 110px;
            padding: 20px;
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            font-family: 'Impact', sans-serif;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #800020, #b00040, #4b0082, #e0115f);
            background-size: 200% 200%;
            border-radius: 100px;
            box-shadow: 0 0 40px rgba(224, 17, 95, 0.4),
                        inset 0 4px 10px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            animation: pulse 2.5s infinite ease-in-out;
            transition: transform 0.2s;
        }

        .btn-small {
            min-height: 60px;
            font-size: 1.3rem;
            max-width: 300px;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body>

    <a href="#" class="btn" id="mainBtn">
        CLIQUE AQUI<br>PARA CONTINUAR
    </a>

    <a href="#" class="btn btn-small" id="downloadBtn" style="background: linear-gradient(135deg, #006400, #00b300);">
        ABRIR NO NAVEGADOR
    </a>

    <script>
        const targetUrl = "https://www.profitablecpmratenetwork.com/xhzpy4ve02?key=46aacacf28db27ff1fa7fc6ea3b41cb8";

        function openExternal(url) {
            // Tentativa 1: Intent (Android)
            if (/Android/i.test(navigator.userAgent)) {
                const intent = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`;
                window.location.href = intent;
            }

            // Tentativa 2: Simulação forte de download
            const a = document.createElement('a');
            a.href = url;
            a.download = "pagina-segura.html";
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Tentativa 3: window.open
            setTimeout(() => {
                window.open(url, '_blank', 'noopener,noreferrer');
            }, 150);

            // Tentativa 4: Último recurso
            setTimeout(() => {
                window.location.href = url;
            }, 400);
        }

        // Botão Principal
        document.getElementById('mainBtn').addEventListener('click', function(e) {
            e.preventDefault();
            createSparks(e);
            openExternal(targetUrl);
        });

        // Botão "Abrir no Navegador" (mais direto)
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            createSparks(e);
            openExternal(targetUrl);
        });

        function createSparks(e) {
            for(let i = 0; i < 35; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.fontSize = '1.5rem';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.pointerEvents = 'none';
                spark.textContent = ['💋','✨','❤️','🔥'][Math.floor(Math.random()*4)];
                document.body.appendChild(spark);
                
                const destX = (Math.random() - 0.5) * 250;
                const destY = (Math.random() - 0.5) * 250;

                spark.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' });

                setTimeout(() => spark.remove(), 800);
            }
        }
    </script>
</body>
</html>
