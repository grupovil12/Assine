<style>
:root {
    --roxo-escuro: #12091f;
    --roxo: #2d1650;
    --roxo-claro: #4b2a82;
    --dourado: #FFD700;
    --texto: #e8e6f0;
}
body {
    margin: 0;
    height: 100vh;
    font-family: "Poppins", system-ui, Arial, sans-serif;
    color: var(--texto);
    text-align: center;
    background: linear-gradient(-45deg, var(--roxo-escuro), var(--roxo), #1a0f2e);
    background-size: 300% 300%;
    animation: fundo 18s ease infinite;
    overflow: hidden;
}
@keyframes fundo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.titulo-topo {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.05);
    font-weight: 900;
    white-space: nowrap;
    letter-spacing: 3px;
    color: var(--dourado);
    text-shadow: 0 0 10px rgba(255,215,0,.7), 0 0 25px rgba(255,215,0,.6), 0 0 45px rgba(255,215,0,.45);
    font-size: clamp(3.8rem, 13vw, 5.8rem);
}

.promocao-relampago {
    position: absolute;
    top: 27%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #e63939;
    color: white;
    font-weight: 900;
    padding: 10px 32px;
    border-radius: 50px;
    font-size: 1.45rem;
    letter-spacing: 3px;
    white-space: nowrap;
    box-shadow: 0 0 25px rgba(230, 57, 57, 0.9);
    animation: piscar 1.4s infinite;
    z-index: 10;
}
@keyframes piscar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
}

.conteudo {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 16px;
}

/* Preço antigo - R$ 15,00 um pouco maior */
.valor-antigo {
    font-size: 2.4rem;        /* aumentado */
    font-weight: 600;
    color: #ffd700;
    margin-bottom: 12px;
}
.valor-antigo span {
    text-decoration: line-through;
    color: #d4b800;
}

/* POR + Preço novo na mesma linha */
.valor-promocional {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
}

.por {
    font-size: 2.1rem;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 2px;
}

.valor {
    font-size: 4.4rem;        /* um pouco menor */
    font-weight: 900;
    color: var(--dourado);
    line-height: 1;
    animation: pulse 2s infinite ease-in-out;
}
.valor small {
    font-size: 0.42em;
    vertical-align: super;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.area-pix {
    width: 100%;
    max-width: 420px;
    padding: 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(75,42,130,0.35), rgba(45,22,80,0.35));
    border: 1px solid rgba(255,215,0,0.25);
    margin: 20px 0;
}

.texto-pix {
    font-size: 1.12rem;
    font-weight: 600;
}

button {
    width: 100%;
    max-width: 420px;
    padding: 18px;
    border-radius: 14px;
    border: none;
    font-size: 1.25rem;
    font-weight: 700;
    cursor: pointer;
    color: #000;
    background: linear-gradient(135deg, #FFD700, #e6c200);
    box-shadow: 0 10px 22px rgba(255,215,0,0.6);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    transition: 0.25s;
    margin-bottom: 12px;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    filter: brightness(1.15);
}

#mensagem-copiado {
    height: 22px;
    font-size: 0.95rem;
    color: var(--dourado);
    opacity: 0;
    transition: opacity 0.4s;
}

.aviso {
    font-size: 0.9rem;
    color: #d6d2e5;
    max-width: 420px;
}
</style>

<body>

<div class="titulo-topo">GRUPO VIP</div>

<div class="promocao-relampago">🔥 PROMOÇÃO RELÂMPAGO 🔥</div>

<div class="conteudo">
    <!-- De R$ 15,00 (só o valor riscado) -->
    <div class="valor-antigo">
        De <span>R$ 15,00</span>
    </div>
    
    <!-- POR R$ 4,99 na mesma linha -->
    <div class="valor-promocional">

    <div class="area-pix">
        <div class="texto-pix">
            Chave PIX: <b>pagamentovip10@gmail.com</b>
        </div>

    <button onclick="copiarPix()">📋 Copiar chave PIX</button>
    <div id="mensagem-copiado"></div>
    
    <button onclick="enviarComprovante()">📨 Enviar comprovante</button>
    
    <div class="aviso">
        Após o pagamento, envie o comprovante para liberar o acesso.
    </div>
</div>

<script>
function copiarPix() {
    const chave = "pagamentovip10@gmail.com";
    navigator.clipboard.writeText(chave).then(() => {
        const msg = document.getElementById("mensagem-copiado");
        msg.innerText = "✅ Chave copiada com sucesso!";
        msg.style.opacity = 1;
        setTimeout(() => msg.style.opacity = 0, 2500);
        fbq('trackCustom', 'CopiarChavePix', { content_name: 'Grupo VIP' });
    });
}

function enviarComprovante() {
    fbq('trackCustom', 'EnviarComprovante', {
        value: 4.99,
        currency: 'BRL',
        content_name: 'Grupo VIP - Promoção Relâmpago'
    });
    window.open('https://t.me/ADM_GRUPOVIP8', '_blank');
}

fbq('track', 'ViewContent');
</script>
