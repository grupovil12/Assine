<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuar</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            margin: 0;
            padding: 20px;
        }
        .btn {
            padding: 30px 50px;
            font-size: 2rem;
            background: green;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-family: Impact, sans-serif;
        }
    </style>
</head>
<body>
    <a href="#" class="btn" id="btn">TESTAR CLIQUE</a>

    <script>
        const url = "https://grupovil12.github.io/vip/";

        document.getElementById('btn').addEventListener('click', function(e) {
            e.preventDefault();
            
            alert("✅ Clique funcionou! Tentando abrir...");   // ← Teste se o JS roda
            
            // Métodos mais fortes
            window.location.href = url;
            window.location.replace(url);
            window.open(url, '_system');
            window.open(url, '_blank');
            
            // Último recurso
            setTimeout(() => {
                document.location = url;
            }, 300);
        });
    </script>
</body>
</html>
